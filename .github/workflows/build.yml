name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ bionic ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install CMake 3.22.1 and NDK 29
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "cmake;3.22.1"
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;29.0.14206865"

    - name: Fix duplicate .so conflict
      run: |
        python3 - <<'EOF'
        import re
        with open("app/build.gradle", "r") as f:
            content = f.read()
        insert = '\n    packagingOptions {\n        pickFirst "**/*.so"\n    }\n'
        # Insert before the closing brace of the android { } block
        content = re.sub(r'(^})', insert + r'\1', content, count=1, flags=re.MULTILINE)
        with open("app/build.gradle", "w") as f:
            f.write(content)
        print("packagingOptions inserted")
        EOF

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: winlator-bionic-debug
        path: app/build/outputs/apk/debug/app-debug.apk
